name: SnowCom
version: 1.0.0
main: com.snowcom.plugin.SnowComPlugin
api-version: 1.20
description: Snow beam command plugin using FallingBlock entities
author: SnowCom

commands:
  com:
    description: Fires a snow beam in the direction you're looking
    usage: /com
    permission: com.use
    permission-message: "&cУ тебя нет прав на использование этой команды!"

permissions:
  com.use:
    description: Allows the use of the /com command
    default: op
